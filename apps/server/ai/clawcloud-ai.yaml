apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: beacon-ai-multi
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/memory: "1Gi"
        run.googleapis.com/cpu: "0.5"
    spec:
      containerConcurrency: 8
      containers:
      - image: gcr.io/PROJECT_ID/beacon-ai-multi:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: OMP_NUM_THREADS
          value: "2"
        - name: REDIS_URL
          value: "redis://localhost:6379"
        resources:
          limits:
            memory: "1Gi"
            cpu: "0.5"
          requests:
            memory: "940Mi"
            cpu: "0.25"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 30