<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/beacon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@100..900&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap"
    rel="stylesheet">

  <title>Beacon - Connect. Communicate. Collaborate.</title>
  
  <script>
    // 🔥 CACHE BURN PROTOCOL v3.1
    (function() {
      const CURRENT_VERSION = 'deepmake-v3.1';
      const storedVersion = localStorage.getItem('BEACON_V');
      
      if (storedVersion !== CURRENT_VERSION) {
        console.log('🧹 Outdated cache detected. Burning...');
        localStorage.setItem('BEACON_V', CURRENT_VERSION);
        
        // Clear everything
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for (let reg of regs) reg.unregister();
          });
        }
        
        // Hard reload with cache buster
        window.location.href = window.location.origin + window.location.pathname + '?v=' + Date.now();
      }
    })();
  </script>

  <script type="module" src="/src/main.tsx?v=deepmake-v3"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx?v=deepmake-v3"></script>
</body>

</html>
