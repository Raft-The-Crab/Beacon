<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/beacon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@100..900&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap"
    rel="stylesheet">

  <script>
    // ☢️ NUCLEAR CACHE RESET v5.0
    (function() {
      const RESET_KEY = 'BEACON_RESET_v5';
      if (!sessionStorage.getItem(RESET_KEY)) {
        sessionStorage.setItem(RESET_KEY, 'done');
        const buster = 'v=' + Date.now();
        const freshUrl = window.location.origin + window.location.pathname + '?' + buster + window.location.hash;
        console.warn('☢️ FORCING CACHED PURGE via REDIRECT...');
        window.location.replace(freshUrl);
      }
    })();
  </script>

  <title>Beacon - Connect. Communicate. Collaborate.</title>
  
  <script>
    // 🔥 CACHE BURN PROTOCOL v5.0
    (function() {
      const CURRENT_VERSION = 'v5.0.0-NUCLEAR';
      const latestVer = localStorage.getItem('BEACON_V');
      
      if (latestVer !== CURRENT_VERSION) {
        localStorage.setItem('BEACON_V', CURRENT_VERSION);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for (let reg of regs) reg.unregister();
          });
        }
        localStorage.clear(); // Complete wipe
      }
    })();
  </script>

  <script type="module" src="/src/main.tsx?v=5.0.0"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx?v=deepmake-v3"></script>
</body>

</html>
