name: Publish SDK to NPM

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v2.0.1
  workflow_dispatch: # Allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build packages
        run: |
          npm run install:packages
          cd packages/types && npm run build || echo "No build script for types"
          cd ../sdk && npm run build
          
      - name: Publish @beacon/types
        run: cd packages/types && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true # Might already be published
          
      - name: Publish @beacon/sdk
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
